name: zb_budget
description: Zero-Based Budget Tracker — Offline-first personal finance app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # ── Immutable Models / Union Types ────────────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── Dependency Injection ──────────────────────────────────────────────────
  get_it: ^7.7.0
  injectable: ^2.3.2

  # ── Routing ───────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Local Database ────────────────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  google_sign_in: ^6.2.1

  # ── SMS Parsing ───────────────────────────────────────────────────────────
  telephony: ^0.2.0
  transaction_sms_parser: ^0.0.1

  # ── Local Notifications ───────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Charts ────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Fonts & Icons ─────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # ── Connectivity ──────────────────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2
  rxdart: ^0.27.7
  collection: ^1.18.0
  shared_preferences: ^2.3.1
  talker: 5.1.17
  share_plus: ^13.1.0
  local_auth: ^3.0.1
  excel: ^4.0.6
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.1
  isar_generator: ^3.1.0+1
 

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
